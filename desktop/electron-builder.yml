appId: com.openbridge.desktop
productName: OpenBridge
copyright: Copyright © 2024 OpenBridge Contributors

# The compiled Electron main/preload JS lives in desktop/electron/ (after tsc),
# and the Vite-built React UI lives in desktop/ui/dist/.
# Run electron-builder from the desktop/ directory.
directories:
  output: ../release/desktop
  buildResources: buildResources

# Entry point compiled by tsc (relative to the desktop/ package root)
main: electron/main.js

# Include the core OpenBridge dist/ as extra resources so bridge-process.ts
# can spawn the bridge at runtime. Placed at resources/bridge/dist/ inside
# the app bundle.
extraResources:
  - from: ../dist
    to: bridge/dist
    filter:
      - '**/*'

# Files to include in the asar archive.
files:
  - electron/**/*.js
  - ui/dist/**/*
  - package.json
  - '!node_modules/**/*'

# ---------------------------------------------------------------------------
# macOS — universal binary (.dmg + .zip)
# Code signing: electron-builder reads CSC_LINK + CSC_KEY_PASSWORD from env.
# When those vars are absent (local dev) signing is skipped automatically.
# Notarization: set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID in CI.
# ---------------------------------------------------------------------------
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: buildResources/entitlements.mac.plist
  entitlementsInherit: buildResources/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  title: OpenBridge ${version}
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 190
      type: file
    - x: 390
      y: 190
      type: link
      path: /Applications

# ---------------------------------------------------------------------------
# Windows — NSIS installer (.exe) + MSI
# Code signing: electron-builder reads WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD.
# When those vars are absent signing is skipped automatically.
# ---------------------------------------------------------------------------
win:
  publisherName: OpenBridge Contributors
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OpenBridge
  include: buildResources/installer.nsh

# ---------------------------------------------------------------------------
# Linux — AppImage + deb + snap
# ---------------------------------------------------------------------------
linux:
  category: Network
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: snap
      arch:
        - x64
  maintainer: OpenBridge Contributors
  vendor: OpenBridge

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

snap:
  summary: AI Bridge — connect messaging channels to local AI agents
  description: |
    OpenBridge connects WhatsApp, Telegram, Discord, and other messaging
    platforms to AI agents (Claude Code, Codex) that explore your workspace
    and execute tasks. Zero API keys. Zero extra cost.
  grade: stable
  confinement: strict
  plugs:
    - home
    - network
    - network-bind

# ---------------------------------------------------------------------------
# Auto-update feed — GitHub Releases (used by electron-updater in task OB-1292)
# ---------------------------------------------------------------------------
publish:
  provider: github
  owner: openbridge-ai
  repo: openbridge
  releaseType: release
