<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Café Réserve — Soirée Ramadan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brown: #4a2c2a;
      --cream: #f5f0e8;
      --gold: #c9a96e;
      --brown-dark: #3c2321;
      --cream-deep: #efe6d8;
      --shadow: 0 16px 40px rgba(74, 44, 42, 0.18);
      --ramadan-teal: #2a6a5a;
      --ramadan-teal-light: rgba(42, 106, 90, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: var(--brown);
      background: radial-gradient(circle at top, #fff8ee 0%, var(--cream) 60%, #efe2cf 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
    }

    /* CSS-only crescent moon */
    .ramadan-crescent {
      display: inline-block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: transparent;
      box-shadow: inset -14px 2px 0 0 var(--gold);
      transform: rotate(-20deg);
      margin-bottom: 12px;
      filter: drop-shadow(0 2px 6px rgba(201, 169, 110, 0.5));
    }

    /* Stars around crescent */
    .ramadan-decor {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 4px;
    }

    .ramadan-star {
      width: 8px;
      height: 8px;
      background: var(--gold);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      opacity: 0.7;
    }

    .ramadan-star.lg {
      width: 12px;
      height: 12px;
      opacity: 0.9;
    }

    header h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.5px;
    }

    header p {
      margin: 10px auto 0;
      max-width: 560px;
      color: rgba(74, 44, 42, 0.8);
      font-size: 1rem;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 10px 20px 40px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #fffdf8;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      border: 1px solid rgba(201, 169, 110, 0.25);
      position: relative;
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.25) 0%, rgba(201, 169, 110, 0) 70%);
      z-index: 0;
    }

    .card::before {
      top: -60px;
      right: -40px;
    }

    .card::after {
      bottom: -80px;
      left: -50px;
    }

    form {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    label {
      display: flex;
      flex-direction: column;
      font-size: 0.95rem;
      font-weight: 500;
      gap: 8px;
    }

    input,
    select,
    textarea {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(74, 44, 42, 0.25);
      background: #fff;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      color: var(--brown);
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.25);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    /* Dish section */
    .dish-section {
      display: none;
      flex-direction: column;
      gap: 18px;
      background: var(--ramadan-teal-light);
      border: 1px solid rgba(42, 106, 90, 0.2);
      border-radius: 16px;
      padding: 20px;
    }

    .dish-section.visible {
      display: flex;
    }

    .dish-section-title {
      font-family: "Playfair Display", serif;
      font-size: 1.1rem;
      color: var(--ramadan-teal);
      margin: 0 0 4px;
      font-weight: 600;
    }

    .entree-header {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--brown);
      padding: 10px 14px;
      background: rgba(201, 169, 110, 0.15);
      border-radius: 10px;
      border-left: 3px solid var(--gold);
    }

    .menu-unavailable {
      font-size: 0.95rem;
      color: rgba(74, 44, 42, 0.7);
      font-style: italic;
      text-align: center;
      padding: 8px 0;
    }

    /* Formula radio buttons */
    .formula-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .formula-group-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--brown);
      margin-bottom: 4px;
    }

    .formula-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .formula-option {
      position: relative;
    }

    .formula-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .formula-option label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1.5px solid rgba(74, 44, 42, 0.2);
      background: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    .formula-option input[type="radio"]:checked + label {
      border-color: var(--gold);
      background: rgba(201, 169, 110, 0.15);
      box-shadow: 0 0 0 2px rgba(201, 169, 110, 0.3);
      font-weight: 600;
    }

    .formula-option label:hover {
      border-color: var(--gold);
    }

    /* Plat cards */
    .plat-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .plat-section-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--brown);
    }

    .plat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .plat-card {
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid rgba(74, 44, 42, 0.15);
      background: #fff;
      font-family: "Inter", sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--brown);
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      line-height: 1.4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .plat-card:hover {
      border-color: rgba(201, 169, 110, 0.6);
      box-shadow: 0 4px 12px rgba(201, 169, 110, 0.2);
    }

    .plat-card.has-qty {
      border-color: var(--gold);
      background: rgba(201, 169, 110, 0.12);
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.3);
      font-weight: 600;
    }

    .plat-card .plat-name {
      font-weight: 500;
    }

    .plat-card.has-qty .plat-name {
      font-weight: 600;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid rgba(74, 44, 42, 0.25);
      background: #fff;
      color: var(--brown);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
      box-shadow: none;
      max-width: 32px;
    }

    .qty-btn:hover:not(:disabled) {
      background: rgba(201, 169, 110, 0.2);
      border-color: var(--gold);
      transform: none;
    }

    .qty-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .qty-value {
      font-size: 1.05rem;
      font-weight: 600;
      min-width: 24px;
      text-align: center;
      color: var(--brown);
    }

    .plat-counter {
      font-size: 0.88rem;
      color: rgba(74, 44, 42, 0.7);
      text-align: center;
      padding: 6px 0 0;
    }

    .plat-counter .count-current {
      font-weight: 600;
      color: var(--ramadan-teal);
    }

    .plat-counter.over-limit .count-current {
      color: #b0463c;
    }

    .dish-loading {
      font-size: 0.9rem;
      color: rgba(74, 44, 42, 0.6);
      text-align: center;
      padding: 8px 0;
      font-style: italic;
    }

    /* Button row */
    .button-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    button {
      width: 100%;
      max-width: 320px;
      padding: 14px 20px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(120deg, var(--gold), #e2c790);
      color: var(--brown-dark);
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(74, 44, 42, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(74, 44, 42, 0.22);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      text-align: center;
      display: none;
    }

    .message.success {
      background: rgba(201, 169, 110, 0.2);
      border: 1px solid rgba(201, 169, 110, 0.5);
    }

    .message.error {
      background: rgba(176, 70, 60, 0.12);
      border: 1px solid rgba(176, 70, 60, 0.35);
    }

    .confetti {
      pointer-events: none;
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
    }

    .confetti span {
      position: absolute;
      width: 8px;
      height: 14px;
      background: var(--gold);
      opacity: 0;
      animation: confetti-fall 1.8s ease-out forwards;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(300px) rotate(260deg);
        opacity: 0;
      }
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: rgba(74, 44, 42, 0.7);
    }

    @media (max-width: 640px) {
      .card {
        padding: 22px 18px;
      }

      header p {
        font-size: 0.95rem;
      }

      .formula-options {
        flex-direction: column;
      }

      .formula-option label {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="ramadan-decor" aria-hidden="true">
      <span class="ramadan-star"></span>
      <span class="ramadan-star lg"></span>
      <span class="ramadan-crescent"></span>
      <span class="ramadan-star lg"></span>
      <span class="ramadan-star"></span>
    </div>
    <h1>Café Réserve — Soirée Ramadan</h1>
    <p>Réservez votre table pour l'Iftar. Chaque soir, découvrez nos 3 plats du jour.</p>
  </header>
  <main>
    <section class="card">
      <div class="confetti" aria-hidden="true"></div>
      <form id="reservationForm" novalidate>
        <div class="grid-2">
          <label>
            Nom complet
            <input type="text" name="fullName" minlength="2" required placeholder="Fatima Benali" />
          </label>
          <label>
            Numéro de téléphone
            <input type="tel" name="phone" required pattern="[0-9]+" placeholder="0612345678" />
          </label>
        </div>
        <div class="grid-2">
          <label>
            Date
            <input type="date" name="date" required />
          </label>
          <label>
            Créneau horaire
            <select name="timeSlot" required>
              <option value="19:30 - Iftar" selected>19:30 — Iftar</option>
              <option value="20:00 - Iftar">20:00 — Iftar</option>
              <option value="20:30 - Iftar">20:30 — Iftar</option>
              <option value="21:00 - Dîner">21:00 — Dîner</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            Nombre de couverts
            <input type="number" name="guests" min="1" max="12" value="2" required />
          </label>
          <label>
            Demandes particulières
            <textarea name="specialRequests" placeholder="Allergies, célébrations, préférences de placement..."></textarea>
          </label>
        </div>

        <!-- Dish selection section — shown after date is picked -->
        <div class="dish-section" id="dishSection" aria-live="polite">
          <p class="dish-loading" id="dishLoading">Chargement du menu du jour...</p>

          <!-- Menu available -->
          <div id="menuAvailable" style="display:none;">
            <p class="entree-header" id="entreeHeader"></p>

            <div class="formula-group">
              <p class="formula-group-label">Formule</p>
              <div class="formula-options">
                <div class="formula-option">
                  <input type="radio" name="formula" id="formula_entree_plat" value="entree_plat" checked />
                  <label for="formula_entree_plat">Entrée + Plat</label>
                </div>
                <div class="formula-option">
                  <input type="radio" name="formula" id="formula_entree_only" value="entree_only" />
                  <label for="formula_entree_only">Entrée seule</label>
                </div>
                <div class="formula-option">
                  <input type="radio" name="formula" id="formula_plat_only" value="plat_only" />
                  <label for="formula_plat_only">Plat seul</label>
                </div>
              </div>
            </div>

            <div class="plat-section" id="platSection">
              <p class="plat-section-label">Choisissez votre plat</p>
              <p class="plat-counter" id="platCounter"><span class="count-current">0</span> / <span id="platCounterMax">2</span> couverts attribués</p>
              <div class="plat-cards" id="platCards"></div>
            </div>
          </div>

          <!-- Menu not available -->
          <p class="menu-unavailable" id="menuUnavailable" style="display:none;">
            Le menu du jour n'est pas encore disponible. Veuillez réessayer plus tard.
          </p>
        </div>

        <div class="button-row">
          <button type="submit">Réserver ma table</button>
          <div id="message" class="message" role="status" aria-live="polite"></div>
        </div>
      </form>
    </section>
  </main>
  <footer>Powered by OpenBridge</footer>

  <script>
    const form = document.getElementById("reservationForm");
    const message = document.getElementById("message");
    const confetti = document.querySelector(".confetti");
    const dateInput = form.querySelector('input[name="date"]');

    // Dish section elements
    const dishSection = document.getElementById("dishSection");
    const dishLoading = document.getElementById("dishLoading");
    const menuAvailable = document.getElementById("menuAvailable");
    const menuUnavailable = document.getElementById("menuUnavailable");
    const entreeHeader = document.getElementById("entreeHeader");
    const platSection = document.getElementById("platSection");
    const platCards = document.getElementById("platCards");

    // Dish state
    const dishesState = {
      loading: false,
      loaded: false,
      hasMenu: false,
      entree: null,
      plats: [],
      selectedPlat: null,
      platQuantities: {},  // { platName: quantity }
    };

    const platCounter = document.getElementById("platCounter");
    const platCounterMax = document.getElementById("platCounterMax");

    // Set min date to today and default to today
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, "0");
    const day = String(today.getDate()).padStart(2, "0");
    const minDate = `${year}-${month}-${day}`;
    dateInput.min = minDate;
    dateInput.value = minDate;

    const showMessage = (text, type) => {
      message.textContent = text;
      message.className = `message ${type}`;
      message.style.display = "block";
    };

    const launchConfetti = () => {
      confetti.innerHTML = "";
      const colors = ["#c9a96e", "#4a2c2a", "#e6c98e", "#f2d7a1"];
      for (let i = 0; i < 26; i += 1) {
        const piece = document.createElement("span");
        const left = Math.random() * 100;
        const delay = Math.random() * 0.4;
        const duration = 1.2 + Math.random() * 1.2;
        piece.style.left = `${left}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = `${delay}s`;
        piece.style.animationDuration = `${duration}s`;
        confetti.appendChild(piece);
      }
    };

    const getSelectedFormula = () => {
      const checked = form.querySelector('input[name="formula"]:checked');
      return checked ? checked.value : null;
    };

    const formulaRequiresPlat = (formula) => {
      return formula === "entree_plat" || formula === "plat_only";
    };

    const getTotalAssigned = () => {
      return Object.values(dishesState.platQuantities).reduce((sum, q) => sum + q, 0);
    };

    const getMaxGuests = () => {
      return Number(form.guests.value) || 1;
    };

    const updatePlatCounter = () => {
      const total = getTotalAssigned();
      const max = getMaxGuests();
      platCounter.querySelector(".count-current").textContent = total;
      platCounterMax.textContent = max;
      platCounter.classList.toggle("over-limit", total > max);

      // Update all + buttons disabled state
      document.querySelectorAll(".plat-card").forEach((card) => {
        const plusBtn = card.querySelector(".qty-btn-plus");
        if (plusBtn) {
          plusBtn.disabled = total >= max;
        }
        const name = card.dataset.plat;
        card.classList.toggle("has-qty", (dishesState.platQuantities[name] || 0) > 0);
      });
    };

    const renderPlatCards = (plats) => {
      platCards.innerHTML = "";
      dishesState.selectedPlat = null;
      dishesState.platQuantities = {};

      plats.forEach((plat) => {
        const name = typeof plat === "string" ? plat : plat.name;
        dishesState.platQuantities[name] = 0;

        const card = document.createElement("div");
        card.className = "plat-card";
        card.dataset.plat = name;

        const nameEl = document.createElement("span");
        nameEl.className = "plat-name";
        nameEl.textContent = name;

        const qtyControl = document.createElement("div");
        qtyControl.className = "qty-control";

        const minusBtn = document.createElement("button");
        minusBtn.type = "button";
        minusBtn.className = "qty-btn qty-btn-minus";
        minusBtn.textContent = "−";
        minusBtn.disabled = true;

        const qtyDisplay = document.createElement("span");
        qtyDisplay.className = "qty-value";
        qtyDisplay.textContent = "0";

        const plusBtn = document.createElement("button");
        plusBtn.type = "button";
        plusBtn.className = "qty-btn qty-btn-plus";
        plusBtn.textContent = "+";

        minusBtn.addEventListener("click", () => {
          if (dishesState.platQuantities[name] > 0) {
            dishesState.platQuantities[name]--;
            qtyDisplay.textContent = dishesState.platQuantities[name];
            minusBtn.disabled = dishesState.platQuantities[name] <= 0;
            updatePlatCounter();
          }
        });

        plusBtn.addEventListener("click", () => {
          const max = getMaxGuests();
          const total = getTotalAssigned();
          if (total < max) {
            dishesState.platQuantities[name]++;
            qtyDisplay.textContent = dishesState.platQuantities[name];
            minusBtn.disabled = false;
            updatePlatCounter();
          }
        });

        qtyControl.appendChild(minusBtn);
        qtyControl.appendChild(qtyDisplay);
        qtyControl.appendChild(plusBtn);

        card.appendChild(nameEl);
        card.appendChild(qtyControl);
        platCards.appendChild(card);
      });

      updatePlatCounter();
    };

    const updatePlatSectionVisibility = () => {
      const formula = getSelectedFormula();
      if (formulaRequiresPlat(formula)) {
        platSection.style.display = "flex";
      } else {
        platSection.style.display = "none";
        dishesState.selectedPlat = null;
      }
    };

    // Listen for formula changes
    form.querySelectorAll('input[name="formula"]').forEach((radio) => {
      radio.addEventListener("change", updatePlatSectionVisibility);
    });

    const showDishSection = (state) => {
      dishSection.classList.add("visible");

      if (state === "loading") {
        dishLoading.style.display = "block";
        menuAvailable.style.display = "none";
        menuUnavailable.style.display = "none";
        return;
      }

      dishLoading.style.display = "none";

      if (state === "available") {
        menuAvailable.style.display = "flex";
        menuAvailable.style.flexDirection = "column";
        menuAvailable.style.gap = "16px";
        menuUnavailable.style.display = "none";
      } else {
        menuAvailable.style.display = "none";
        menuUnavailable.style.display = "block";
      }
    };

    const hideDishSection = () => {
      dishSection.classList.remove("visible");
      dishesState.loaded = false;
      dishesState.hasMenu = false;
      dishesState.entree = null;
      dishesState.plats = [];
      dishesState.selectedPlat = null;
      dishesState.platQuantities = {};
    };

    const fetchDishes = async (date) => {
      dishesState.loading = true;
      dishesState.loaded = false;
      dishesState.hasMenu = false;
      showDishSection("loading");

      try {
        const response = await fetch(`/api/dishes/${date}`);

        if (!response.ok) {
          // 404 or other error = no menu for this date
          dishesState.loaded = true;
          dishesState.hasMenu = false;
          showDishSection("unavailable");
          return;
        }

        const data = await response.json();

        // Accept { dishes: { entree, plats } } or { data: { entree, plats } } or { entree, plats }
        const menu = data.dishes || data.data || data;
        const entree = menu.entree || null;
        const plats = Array.isArray(menu.plats) ? menu.plats : [];

        if (!entree && plats.length === 0) {
          dishesState.loaded = true;
          dishesState.hasMenu = false;
          showDishSection("unavailable");
          return;
        }

        dishesState.entree = entree;
        dishesState.plats = plats;
        dishesState.loaded = true;
        dishesState.hasMenu = true;

        // Update DOM
        entreeHeader.textContent = entree ? `Entrée du jour : ${entree}` : "";
        entreeHeader.style.display = entree ? "block" : "none";

        renderPlatCards(plats);

        // Reset formula to default
        const defaultRadio = form.querySelector('input[name="formula"][value="entree_plat"]');
        if (defaultRadio) defaultRadio.checked = true;
        updatePlatSectionVisibility();

        showDishSection("available");
      } catch (err) {
        dishesState.loaded = true;
        dishesState.hasMenu = false;
        showDishSection("unavailable");
      } finally {
        dishesState.loading = false;
      }
    };

    // Update plat counter when guests count changes
    const guestsInput = form.querySelector('input[name="guests"]');
    guestsInput.addEventListener("input", () => {
      if (dishesState.hasMenu) {
        // If total assigned exceeds new max, trim quantities
        const max = getMaxGuests();
        let total = getTotalAssigned();
        if (total > max) {
          // Reduce from the end until we fit
          const names = Object.keys(dishesState.platQuantities);
          for (let i = names.length - 1; i >= 0 && total > max; i--) {
            const reduce = Math.min(dishesState.platQuantities[names[i]], total - max);
            dishesState.platQuantities[names[i]] -= reduce;
            total -= reduce;
          }
          // Update display
          document.querySelectorAll(".plat-card").forEach((card) => {
            const n = card.dataset.plat;
            const qtyEl = card.querySelector(".qty-value");
            const minusEl = card.querySelector(".qty-btn-minus");
            if (qtyEl) qtyEl.textContent = dishesState.platQuantities[n] || 0;
            if (minusEl) minusEl.disabled = (dishesState.platQuantities[n] || 0) <= 0;
          });
        }
        updatePlatCounter();
      }
    });

    // Fetch dishes when date changes
    dateInput.addEventListener("change", () => {
      const date = dateInput.value;
      if (!date) {
        hideDishSection();
        return;
      }
      fetchDishes(date);
    });

    // Auto-fetch dishes for today on page load
    fetchDishes(minDate);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.style.display = "none";

      if (!form.checkValidity()) {
        form.reportValidity();
        showMessage("Veuillez compléter tous les champs obligatoires correctement.", "error");
        return;
      }

      // Dish validation
      if (dateInput.value) {
        if (dishesState.loading) {
          showMessage("Le menu du jour est en cours de chargement. Veuillez patienter.", "error");
          return;
        }

        if (dishesState.hasMenu) {
          const formula = getSelectedFormula();
          if (!formula) {
            showMessage("Veuillez choisir une formule.", "error");
            return;
          }

          if (formulaRequiresPlat(formula)) {
            const totalAssigned = getTotalAssigned();
            const maxGuests = getMaxGuests();
            if (totalAssigned === 0) {
              showMessage("Veuillez attribuer au moins un couvert à un plat.", "error");
              return;
            }
            if (totalAssigned > maxGuests) {
              showMessage(`Le nombre de plats attribués (${totalAssigned}) dépasse le nombre de couverts (${maxGuests}).`, "error");
              return;
            }
          }
        }
      }

      const formula = dishesState.hasMenu ? getSelectedFormula() : null;

      // Build plat selections: { platName: qty } for non-zero quantities
      let platSelections = {};
      if (dishesState.hasMenu && formula && formulaRequiresPlat(formula)) {
        for (const [name, qty] of Object.entries(dishesState.platQuantities)) {
          if (qty > 0) platSelections[name] = qty;
        }
      }

      const payload = {
        fullName: form.fullName.value.trim(),
        phone: form.phone.value.trim(),
        date: form.date.value,
        timeSlot: form.timeSlot.value,
        guests: Number(form.guests.value),
        specialRequests: form.specialRequests.value.trim(),
        ...(formula ? { formula, platSelections } : {}),
      };

      const submitButton = form.querySelector("button[type='submit']");
      submitButton.disabled = true;

      try {
        const response = await fetch("/api/reservations", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          throw new Error("Reservation failed");
        }

        showMessage("Réservation confirmée ! Nous vous attendons avec impatience. Ramadan Mubarak 🌙", "success");
        launchConfetti();
        form.reset();
        dateInput.min = minDate;
        hideDishSection();
      } catch (error) {
        showMessage("Nous n'avons pas pu finaliser votre réservation. Veuillez réessayer.", "error");
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
