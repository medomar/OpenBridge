name: Release Binaries

on:
  push:
    tags:
      - 'bin-v*'
  # Disabled for v* tags until binary packaging (Phase 72) is validated.
  # To trigger manually: push a tag like `bin-v0.0.9`

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Binaries + DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package macOS ARM64 binary
        run: npm run package:mac

      - name: Package macOS x64 binary
        run: npm run package:mac-x64

      - name: Create macOS DMG
        run: bash scripts/create-dmg.sh

      - name: Upload macOS ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: openbridge-macos-arm64
          path: release/openbridge-macos-arm64
          retention-days: 7

      - name: Upload macOS x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: openbridge-macos-x64
          path: release/openbridge-macos-x64
          retention-days: 7

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: openbridge-macos-dmg
          path: release/OpenBridge-*-macOS.dmg
          retention-days: 7

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package Linux x64 binary
        run: npm run package:linux

      - name: Upload Linux x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: openbridge-linux-x64
          path: release/openbridge-linux-x64
          retention-days: 7

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package Windows x64 binary
        run: npm run package:win

      - name: Upload Windows x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: openbridge-win-x64
          path: release/openbridge-win-x64.exe
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: openbridge-macos-arm64
          path: release/

      - name: Download macOS x64 binary
        uses: actions/download-artifact@v4
        with:
          name: openbridge-macos-x64
          path: release/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: openbridge-macos-dmg
          path: release/

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: openbridge-linux-x64
          path: release/

      - name: Download Windows x64 binary
        uses: actions/download-artifact@v4
        with:
          name: openbridge-win-x64
          path: release/

      - name: Extract changelog excerpt
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract the section for this version from CHANGELOG.md
          # Looks for "## [vX.Y.Z]" or "## vX.Y.Z" heading and captures until next "## "
          CHANGELOG_EXCERPT=$(awk "/^## (\[)?${VERSION}(\])?/,/^## /" CHANGELOG.md | head -n -1 | tail -n +2 || echo "See CHANGELOG.md for details.")
          if [ -z "$CHANGELOG_EXCERPT" ]; then
            CHANGELOG_EXCERPT="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a file to preserve newlines
          echo "$CHANGELOG_EXCERPT" > /tmp/release-notes.txt

      - name: Rename binaries with version
        run: |
          VERSION="${{ github.ref_name }}"
          cp release/openbridge-macos-arm64 release/openbridge-macos-arm64-${VERSION} 2>/dev/null || true
          cp release/openbridge-macos-x64 release/openbridge-macos-x64-${VERSION} 2>/dev/null || true
          cp release/openbridge-linux-x64 release/openbridge-linux-x64-${VERSION} 2>/dev/null || true
          cp release/openbridge-win-x64.exe release/openbridge-win-x64-${VERSION}.exe 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenBridge ${{ github.ref_name }}
          body_path: /tmp/release-notes.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release/openbridge-macos-arm64
            release/openbridge-macos-x64
            release/OpenBridge-*-macOS.dmg
            release/openbridge-linux-x64
            release/openbridge-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
